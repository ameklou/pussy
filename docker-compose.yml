version: '3.8'

services:
  payload:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payload-app
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - payload_media:/app/media
    networks:
      - dokploy-network

volumes:
  payload_media:

networks:
  dokploy-network:
    external: true